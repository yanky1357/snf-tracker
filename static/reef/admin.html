<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReefPilot Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0B1622;color:#F0F4F8;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#162233;border-radius:16px;padding:32px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.login-box h1{color:#00B4D8;font-size:22px;margin-bottom:8px;text-align:center}
.login-box p{color:#8899AA;font-size:13px;text-align:center;margin-bottom:24px}
.login-box input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#F0F4F8;font-size:15px;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:#00B4D8;background:rgba(0,180,216,0.06)}
.login-box button{width:100%;padding:13px;background:linear-gradient(135deg,#00ccee,#00B4D8,#0096B7);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.login-box .err{color:#F87171;font-size:13px;text-align:center;margin-bottom:12px;display:none}
.dashboard{display:none;padding:20px;max-width:1000px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;gap:8px}
.dash-header h1{color:#00B4D8;font-size:24px;font-weight:700}
.dash-header-actions{display:flex;gap:8px;align-items:center}
.header-btn{color:#8899AA;font-size:13px;cursor:pointer;padding:6px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:none;text-decoration:none}
.header-btn:hover{color:#00B4D8;border-color:#00B4D8}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:#162233;border-radius:14px;padding:16px;text-align:center;border:1px solid rgba(255,255,255,0.04)}
.stat-card .num{font-size:28px;font-weight:800;color:#00B4D8}
.stat-card .label{font-size:10px;color:#8899AA;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card.green .num{color:#34D399}
.stat-card.amber .num{color:#FBBF24}
.stat-card.red .num{color:#F87171}
.stat-card.purple .num{color:#A78BFA}
.section-title{font-size:16px;font-weight:600;color:#F0F4F8;margin-bottom:12px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.chart-card{background:#162233;border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,0.04)}
.chart-card h3{font-size:14px;font-weight:600;color:#F0F4F8;margin-bottom:12px}
.adoption-section{background:#162233;border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,0.04);margin-bottom:24px}
.adoption-bar{display:flex;align-items:center;margin-bottom:8px;font-size:13px}
.adoption-bar .bar-label{width:80px;color:#8899AA;flex-shrink:0}
.adoption-bar .bar-track{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;margin:0 10px;overflow:hidden}
.adoption-bar .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#00B4D8,#34D399);transition:width 0.5s}
.adoption-bar .bar-pct{width:40px;text-align:right;color:#F0F4F8;font-weight:600}
.retention-row{display:flex;gap:12px;margin-bottom:24px}
.retention-card{flex:1;background:#162233;border-radius:14px;padding:16px;text-align:center;border:1px solid rgba(255,255,255,0.04)}
.retention-card .r-num{font-size:24px;font-weight:800}
.retention-card .r-label{font-size:10px;color:#8899AA;margin-top:4px;text-transform:uppercase}
.popular-section{background:#162233;border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,0.04);margin-bottom:24px}
.popular-item{display:flex;align-items:center;margin-bottom:6px;font-size:13px}
.popular-item .pop-rank{width:24px;color:#8899AA;font-weight:700}
.popular-item .pop-name{flex:1;color:#F0F4F8}
.popular-item .pop-bar{width:100px;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;margin:0 8px;overflow:hidden}
.popular-item .pop-fill{height:100%;background:#00B4D8;border-radius:3px}
.popular-item .pop-count{width:30px;text-align:right;color:#8899AA}
.search-bar{width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#F0F4F8;font-size:14px;outline:none;margin-bottom:12px}
.search-bar:focus{border-color:#00B4D8}
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-pill{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:none;color:#8899AA;transition:all 0.15s}
.filter-pill.active{background:rgba(0,180,216,0.15);border-color:#00B4D8;color:#00B4D8}
.filter-pill:hover{border-color:#00B4D8;color:#00B4D8}
.user-card{background:#162233;border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.15s}
.user-card:hover{background:#1a2a3e}
.user-card .avatar{width:36px;height:36px;border-radius:10px;background:rgba(0,180,216,0.12);display:flex;align-items:center;justify-content:center;color:#00B4D8;font-weight:700;font-size:13px;flex-shrink:0}
.user-card .info{flex:1;min-width:0}
.user-card .name{font-size:13px;font-weight:600;color:#F0F4F8;display:flex;align-items:center;gap:6px}
.user-card .email{font-size:10px;color:#8899AA;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-card .user-meta{font-size:10px;color:#667788;margin-top:2px}
.user-card .meta{text-align:right;flex-shrink:0}
.user-card .tank{font-size:11px;color:#F0F4F8}
.user-card .time{font-size:10px;color:#8899AA}
.eng-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.eng-dot.high{background:#34D399}
.eng-dot.med{background:#FBBF24}
.eng-dot.low{background:#F87171}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge.yes{background:rgba(52,211,153,0.15);color:#34D399}
.badge.no{background:rgba(248,113,113,0.15);color:#F87171}
.view-btn{padding:5px 12px;background:#00B4D8;color:white;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0}
.view-btn:hover{background:#00a0c0}
.detail-panel{background:#162233;border-radius:14px;border:1px solid rgba(0,180,216,0.2);padding:20px;margin-top:16px;display:none}
.detail-section{background:rgba(255,255,255,0.02);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.04)}
.detail-section h3{font-size:13px;font-weight:600;color:#00B4D8;margin-bottom:10px}
.param-chip{display:inline-block;background:rgba(0,180,216,0.08);padding:5px 10px;border-radius:8px;font-size:12px;margin:3px}
.chat-msg{padding:8px 12px;margin-bottom:6px;border-radius:10px;font-size:12px;border-left:3px solid}
.health-gauge{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;font-size:22px;font-weight:800}
.feature-bar{display:flex;align-items:center;margin-bottom:5px;font-size:12px}
.feature-bar .fb-label{width:120px;color:#8899AA}
.feature-bar .fb-count{color:#F0F4F8;font-weight:600}
.auto-refresh{color:#8899AA;font-size:11px;text-align:center;margin-top:20px;padding:12px}
@media(max-width:700px){
  .charts-row{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(auto-fit,minmax(90px,1fr))}
  .stat-card .num{font-size:22px}
  .retention-row{flex-direction:column}
  .user-card{flex-wrap:wrap}
}
</style></head><body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>ReefPilot Admin</h1>
    <p>Enter your admin password</p>
    <div class="err" id="loginErr">Wrong password</div>
    <input type="password" id="passInput" placeholder="Password" autofocus>
    <button id="loginBtn">Sign In</button>
  </div>
</div>

<div class="dashboard" id="dash">
  <div class="dash-header">
    <h1>ReefPilot Dashboard</h1>
    <div class="dash-header-actions">
      <a class="header-btn" id="exportBtn">Export CSV</a>
      <span class="header-btn" id="refreshBtn">Refresh</span>
    </div>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="charts-row" id="chartsRow">
    <div class="chart-card"><h3>User Growth</h3><canvas id="growthChart"></canvas></div>
    <div class="chart-card"><h3>Tank Types</h3><canvas id="tankChart"></canvas></div>
  </div>
  <div id="adoptionSection"></div>
  <div class="retention-row" id="retentionRow"></div>
  <div id="popularSection"></div>
  <input type="text" id="userSearch" class="search-bar" placeholder="Search by name, email, or tank type...">
  <div class="filter-row" id="filterRow">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="active">Active (7d)</button>
    <button class="filter-pill" data-filter="inactive">Inactive</button>
    <button class="filter-pill" data-filter="onboarded">Onboarded</button>
    <button class="filter-pill" data-filter="pending">Pending</button>
  </div>
  <div class="section-title" id="usersTitle">Recent Users</div>
  <div id="usersList"></div>
  <div class="detail-panel" id="detailPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title" id="detailTitle" style="margin:0"></div>
      <span style="color:#8899AA;cursor:pointer;font-size:13px" id="closeDetail">Close</span>
    </div>
    <div id="detailContent"></div>
  </div>
  <div class="auto-refresh" id="refreshNote">Auto-refreshes every 30 seconds</div>
</div>

<script src="/static/reef/js/chart.umd.min.js"></script>
<script>
var adminKey = '';
var allUsers = [];
var activeFilter = 'all';
var growthChartInstance = null;
var tankChartInstance = null;

document.getElementById('passInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('refreshBtn').addEventListener('click', loadStats);
document.getElementById('closeDetail').addEventListener('click', function() {
  document.getElementById('detailPanel').style.display = 'none';
});
document.getElementById('exportBtn').addEventListener('click', function() {
  window.open('/reef/api/admin/export?key=' + encodeURIComponent(adminKey));
});
document.getElementById('userSearch').addEventListener('input', filterUsers);
document.getElementById('filterRow').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-pill')) {
    document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
    e.target.classList.add('active');
    activeFilter = e.target.getAttribute('data-filter');
    filterUsers();
  }
});

function timeAgo(dateStr) {
  if (!dateStr) return 'Never';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return 'Never';
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 0) diff = 0;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return Math.floor(diff / 604800) + 'w ago';
}

function doLogin() {
  adminKey = document.getElementById('passInput').value;
  fetch('/reef/api/admin/stats?key=' + encodeURIComponent(adminKey))
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(d) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      renderDashboard(d);
      setInterval(loadStats, 30000);
    })
    .catch(function() {
      document.getElementById('loginErr').style.display = 'block';
    });
}

function loadStats() {
  fetch('/reef/api/admin/stats?key=' + encodeURIComponent(adminKey))
    .then(function(r) { return r.json(); })
    .then(renderDashboard)
    .catch(function() {});
}

function renderDashboard(d) {
  // Stat cards
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="num">' + d.total_users + '</div><div class="label">Total Users</div></div>' +
    '<div class="stat-card green"><div class="num">' + d.onboarded_users + '</div><div class="label">Onboarded</div></div>' +
    '<div class="stat-card amber"><div class="num">' + d.signups_today + '</div><div class="label">Today</div></div>' +
    '<div class="stat-card"><div class="num">' + d.signups_this_week + '</div><div class="label">This Week</div></div>' +
    '<div class="stat-card purple"><div class="num">' + d.dau + '</div><div class="label">Active Today</div></div>' +
    '<div class="stat-card green"><div class="num">' + d.wau + '</div><div class="label">Active 7d</div></div>' +
    '<div class="stat-card"><div class="num">' + d.avg_tank_size + 'g</div><div class="label">Avg Tank</div></div>' +
    '<div class="stat-card"><div class="num">$' + d.avg_spending + '</div><div class="label">Avg Spend</div></div>';

  // Charts
  renderGrowthChart(d.growth_chart || []);
  renderTankChart(d.tank_type_breakdown || []);

  // Feature adoption
  var fa = d.feature_adoption || {};
  var adoptionHtml = '<div class="adoption-section"><h3 class="section-title" style="margin-bottom:14px">Feature Adoption</h3>';
  var features = [
    ['Params', fa.params], ['Chat', fa.chat], ['Costs', fa.costs],
    ['Livestock', fa.livestock], ['Dosing', fa.dosing], ['Journal', fa.journal]
  ];
  for (var i = 0; i < features.length; i++) {
    var pct = features[i][1] || 0;
    adoptionHtml += '<div class="adoption-bar"><div class="bar-label">' + features[i][0] + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="bar-pct">' + pct + '%</div></div>';
  }
  adoptionHtml += '</div>';
  document.getElementById('adoptionSection').innerHTML = adoptionHtml;

  // Retention
  var ret = d.retention || {};
  document.getElementById('retentionRow').innerHTML =
    '<div class="retention-card"><div class="r-num" style="color:#34D399">' + (ret.active_7d || 0) + '</div><div class="r-label">Active 7 days</div></div>' +
    '<div class="retention-card"><div class="r-num" style="color:#FBBF24">' + (ret.active_30d || 0) + '</div><div class="r-label">Active 30d only</div></div>' +
    '<div class="retention-card"><div class="r-num" style="color:#F87171">' + (ret.inactive || 0) + '</div><div class="r-label">Inactive</div></div>';

  // Popular livestock
  var pop = d.popular_livestock || [];
  if (pop.length > 0) {
    var maxPop = pop[0].count;
    var popHtml = '<div class="popular-section"><h3 class="section-title" style="margin-bottom:14px">Popular Livestock</h3>';
    for (var p = 0; p < pop.length; p++) {
      var pctW = Math.round(pop[p].count / maxPop * 100);
      popHtml += '<div class="popular-item"><div class="pop-rank">' + (p + 1) + '.</div>' +
        '<div class="pop-name">' + pop[p].name + '</div>' +
        '<div class="pop-bar"><div class="pop-fill" style="width:' + pctW + '%"></div></div>' +
        '<div class="pop-count">' + pop[p].count + '</div></div>';
    }
    popHtml += '</div>';
    document.getElementById('popularSection').innerHTML = popHtml;
  }

  // Users
  allUsers = d.recent_users || [];
  filterUsers();

  document.getElementById('refreshNote').textContent = 'Last updated: ' + new Date().toLocaleTimeString() + ' · Auto-refreshes every 30s';
}

function renderGrowthChart(data) {
  if (growthChartInstance) growthChartInstance.destroy();
  var ctx = document.getElementById('growthChart').getContext('2d');
  // Make cumulative
  var cumulative = [];
  var total = 0;
  for (var i = 0; i < data.length; i++) {
    total += data[i].signups;
    cumulative.push(total);
  }
  growthChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(function(d) { return d.day; }),
      datasets: [{
        label: 'Total Users',
        data: cumulative,
        borderColor: '#00B4D8',
        backgroundColor: 'rgba(0,180,216,0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 2,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#667788', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#667788', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true }
      }
    }
  });
}

function renderTankChart(data) {
  if (tankChartInstance) tankChartInstance.destroy();
  var ctx = document.getElementById('tankChart').getContext('2d');
  var colors = ['#00B4D8', '#34D399', '#FBBF24', '#F87171', '#A78BFA', '#FB923C', '#38BDF8', '#4ADE80'];
  tankChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(function(d) { return (d.type || 'Unknown').replace(/_/g, ' '); }),
      datasets: [{
        data: data.map(function(d) { return d.count; }),
        backgroundColor: colors.slice(0, data.length),
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      cutout: '60%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8899AA', font: { size: 11 }, padding: 8, usePointStyle: true } }
      }
    }
  });
}

function filterUsers() {
  var query = document.getElementById('userSearch').value.toLowerCase();
  var filtered = allUsers.filter(function(u) {
    var matchSearch = !query ||
      (u.name || '').toLowerCase().indexOf(query) >= 0 ||
      u.email.toLowerCase().indexOf(query) >= 0 ||
      (u.tank_type || '').toLowerCase().indexOf(query) >= 0;
    if (!matchSearch) return false;
    if (activeFilter === 'all') return true;
    if (activeFilter === 'active') return u.last_active && (Date.now() - new Date(u.last_active).getTime()) < 7 * 86400000;
    if (activeFilter === 'inactive') return !u.last_active || (Date.now() - new Date(u.last_active).getTime()) >= 7 * 86400000;
    if (activeFilter === 'onboarded') return u.onboarded;
    if (activeFilter === 'pending') return !u.onboarded;
    return true;
  });
  document.getElementById('usersTitle').textContent = 'Users (' + filtered.length + ')';
  renderUserCards(filtered);
}

function renderUserCards(users) {
  var html = '';
  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var dt = new Date(u.joined);
    var time = isNaN(dt.getTime()) ? u.joined : dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    var tank = u.tank_size ? (u.tank_size + 'g ' + (u.tank_type || '').replace(/_/g, ' ')) : '—';
    var initials = (u.name || u.email || '?').substring(0, 2).toUpperCase();
    var badge = u.onboarded ? '<span class="badge yes">Done</span>' : '<span class="badge no">Pending</span>';
    var engClass = u.engagement_score > 70 ? 'high' : u.engagement_score > 30 ? 'med' : 'low';
    var lastAct = timeAgo(u.last_active);
    var exp = u.experience ? u.experience.replace(/_/g, ' ') : '';
    var lsCount = u.livestock_count || 0;

    html += '<div class="user-card" data-id="' + u.id + '">' +
      '<div class="avatar">' + initials + '</div>' +
      '<div class="info">' +
        '<div class="name"><span class="eng-dot ' + engClass + '"></span>' + (u.name || '—') + '</div>' +
        '<div class="email">' + u.email + '</div>' +
        '<div class="user-meta">' + (exp ? exp + ' · ' : '') + lsCount + ' livestock · ' + lastAct + '</div>' +
      '</div>' +
      '<div class="meta"><div class="tank">' + tank + '</div><div class="time">' + time + '</div></div>' +
      badge +
      '<button class="view-btn" data-id="' + u.id + '">View</button>' +
      '</div>';
  }
  var list = document.getElementById('usersList');
  list.innerHTML = html;
  var buttons = list.querySelectorAll('.view-btn');
  for (var j = 0; j < buttons.length; j++) {
    buttons[j].addEventListener('click', function(e) {
      e.stopPropagation();
      loadUserDetail(parseInt(this.getAttribute('data-id')));
    });
  }
}

function loadUserDetail(uid) {
  var panel = document.getElementById('detailPanel');
  var content = document.getElementById('detailContent');
  content.innerHTML = '<div style="text-align:center;padding:20px;color:#8899AA">Loading...</div>';
  panel.style.display = 'block';
  panel.scrollIntoView({behavior: 'smooth'});

  fetch('/reef/api/admin/user/' + uid + '?key=' + encodeURIComponent(adminKey))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var u = d.user;
      var ret = d.retention || {};
      var fu = d.feature_usage || {};
      var mc = d.monthly_cost || {};
      document.getElementById('detailTitle').textContent = u.name || u.email;

      var html = '';

      // Health score + top stats
      var hs = d.health_score;
      var hsColor = hs >= 70 ? '#34D399' : hs >= 40 ? '#FBBF24' : '#F87171';
      html += '<div class="stats-grid" style="margin-bottom:16px">';
      if (hs !== null) {
        html += '<div class="stat-card"><div class="health-gauge" style="border:3px solid ' + hsColor + ';color:' + hsColor + '">' + hs + '</div><div class="label">Health</div></div>';
      }
      html += '<div class="stat-card"><div class="num">' + (ret.days_since_signup || 0) + '</div><div class="label">Days Member</div></div>';
      html += '<div class="stat-card green"><div class="num">' + (ret.days_active || 0) + '</div><div class="label">Days Active</div></div>';
      html += '<div class="stat-card"><div class="num">' + timeAgo(ret.last_active) + '</div><div class="label">Last Active</div></div>';
      html += '<div class="stat-card amber"><div class="num">$' + (mc.total || 0) + '</div><div class="label">This Month</div></div>';
      html += '</div>';

      // Profile
      html += '<div class="detail-section"><h3>Profile</h3>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">';
      html += '<div><span style="color:#8899AA">Tank:</span> ' + (u.tank_size || '—') + 'g ' + (u.tank_type || '').replace(/_/g, ' ') + '</div>';
      html += '<div><span style="color:#8899AA">Salt:</span> ' + (u.salt_brand || '—') + '</div>';
      html += '<div><span style="color:#8899AA">Experience:</span> ' + (u.experience || '—').replace(/_/g, ' ') + '</div>';
      html += '<div><span style="color:#8899AA">Fish:</span> ' + (u.fish_count || '—') + '</div>';
      html += '<div><span style="color:#8899AA">Dosing:</span> ' + (u.dosing || '—') + '</div>';
      html += '<div><span style="color:#8899AA">Joined:</span> ' + new Date(u.joined).toLocaleDateString() + '</div>';
      html += '</div></div>';

      // Feature usage
      html += '<div class="detail-section"><h3>Feature Usage</h3>';
      var feats = [
        ['Parameters', fu.parameters], ['Chat messages', fu.chat], ['Livestock', fu.livestock],
        ['Equipment', fu.equipment], ['Cost entries', fu.costs], ['Recurring costs', fu.recurring_costs],
        ['Calendar tasks', fu.calendar_tasks], ['Maintenance tasks', fu.maintenance_tasks],
        ['Dosing presets', fu.dosing_presets], ['Journal entries', fu.journal_entries]
      ];
      for (var f = 0; f < feats.length; f++) {
        var cnt = feats[f][1] || 0;
        html += '<div class="feature-bar"><div class="fb-label">' + feats[f][0] + '</div><div class="fb-count">' + cnt + '</div></div>';
      }
      html += '</div>';

      // Params
      if (d.param_logs.length > 0) {
        html += '<div class="detail-section"><h3>Recent Parameters</h3><div>';
        for (var i = 0; i < Math.min(d.param_logs.length, 20); i++) {
          var p = d.param_logs[i];
          html += '<span class="param-chip"><b style="color:#00B4D8">' + p.parameter_type + '</b> ' + p.value + ' ' + (p.unit || '') + '</span>';
        }
        html += '</div></div>';
      }

      // Chat
      if (d.chat_history.length > 0) {
        html += '<div class="detail-section"><h3>Recent Chat</h3>';
        for (var j = 0; j < Math.min(d.chat_history.length, 10); j++) {
          var c = d.chat_history[j];
          var isUser = c.role === 'user';
          var msg = c.content.length > 150 ? c.content.substring(0, 150) + '...' : c.content;
          msg = msg.replace(/</g, '&lt;');
          html += '<div class="chat-msg" style="background:' + (isUser ? 'rgba(0,180,216,0.06)' : 'rgba(255,255,255,0.02)') +
            ';border-left-color:' + (isUser ? '#00B4D8' : '#34D399') + '">' +
            '<b style="color:' + (isUser ? '#00B4D8' : '#34D399') + '">' + (isUser ? 'User' : 'AI') + ':</b> ' + msg + '</div>';
        }
        html += '</div>';
      }

      // Livestock
      if (d.livestock.length > 0) {
        html += '<div class="detail-section"><h3>Livestock</h3>';
        for (var k = 0; k < d.livestock.length; k++) {
          var l = d.livestock[k];
          html += '<div style="font-size:13px;padding:3px 0">' + (l.common_name || l.species || '—') +
            ' <span style="color:#8899AA">x' + (l.quantity || 1) + ' · ' + (l.category || '') + '</span></div>';
        }
        html += '</div>';
      }

      // Equipment
      if (d.equipment.length > 0) {
        html += '<div class="detail-section"><h3>Equipment</h3>';
        for (var eq = 0; eq < d.equipment.length; eq++) {
          var e = d.equipment[eq];
          html += '<div style="font-size:13px;padding:3px 0">' + (e.brand || '') + ' ' + (e.model || '') +
            ' <span style="color:#8899AA">' + (e.category || '') + '</span></div>';
        }
        html += '</div>';
      }

      // Dosing presets
      if (d.dosing_presets && d.dosing_presets.length > 0) {
        html += '<div class="detail-section"><h3>Dosing Presets</h3>';
        for (var dp = 0; dp < d.dosing_presets.length; dp++) {
          var pr = d.dosing_presets[dp];
          html += '<div style="font-size:13px;padding:3px 0">' + pr.name +
            ' <span style="color:#8899AA">' + (pr.amount || '') + ' · ' + (pr.frequency || '') + '</span></div>';
        }
        html += '</div>';
      }

      // Journal
      if (d.journal_entries && d.journal_entries.length > 0) {
        html += '<div class="detail-section"><h3>Journal Entries</h3>';
        for (var je = 0; je < d.journal_entries.length; je++) {
          var jn = d.journal_entries[je];
          var noteText = (jn.notes || '').length > 100 ? jn.notes.substring(0, 100) + '...' : (jn.notes || '');
          noteText = noteText.replace(/</g, '&lt;');
          html += '<div style="font-size:13px;padding:4px 0"><span style="color:#00B4D8">' + (jn.log_date || '') + '</span> ' + noteText + '</div>';
        }
        html += '</div>';
      }

      // Purchases
      if (d.purchases && d.purchases.length > 0) {
        html += '<div class="detail-section"><h3>Recent Purchases</h3>';
        for (var pc = 0; pc < d.purchases.length; pc++) {
          var pu = d.purchases[pc];
          html += '<div style="font-size:13px;padding:3px 0;display:flex;justify-content:space-between">' +
            '<span>' + (pu.description || pu.category || '—') + ' <span style="color:#8899AA">' + (pu.category || '') + '</span></span>' +
            '<span style="color:#34D399;font-weight:600">$' + (pu.amount || 0) + '</span></div>';
        }
        html += '</div>';
      }

      // Tasks
      var allTasks = [];
      for (var m = 0; m < d.calendar_tasks.length; m++) allTasks.push(d.calendar_tasks[m].title + ' · ' + d.calendar_tasks[m].frequency);
      for (var n = 0; n < d.maintenance_tasks.length; n++) allTasks.push(d.maintenance_tasks[n].task_name + ' · ' + d.maintenance_tasks[n].frequency);
      if (allTasks.length > 0) {
        html += '<div class="detail-section"><h3>Tasks</h3>';
        for (var t = 0; t < allTasks.length; t++) {
          html += '<div style="font-size:13px;padding:3px 0;color:#F0F4F8">' + allTasks[t] + '</div>';
        }
        html += '</div>';
      }

      content.innerHTML = html;
    })
    .catch(function() {
      content.innerHTML = '<div style="color:#F87171;padding:20px;text-align:center">Failed to load user data</div>';
    });
}
</script>
</body></html>
